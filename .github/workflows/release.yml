name: Release to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: pypi-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and verify distributions
    runs-on: ubuntu-latest
    steps:
      - name: Check out the released tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.release.tag_name }}
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install pinned release tools
        run: python -m pip install -r requirements/release.txt
      - name: Require the release tag to match the package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import os
          from applied_ai_rig import __version__

          actual = os.environ["RELEASE_TAG"]
          expected = f"v{__version__}"
          if actual != expected:
              raise SystemExit(
                  f"Release tag must equal v<package-version>: expected {expected!r}, got {actual!r}"
              )
          PY
      - name: Run tests and quality gates
        run: |
          python -m unittest discover -s tests -v
          python -m compileall -q init.py applied_ai_rig tests tools
          ruff check init.py applied_ai_rig tests tools
          mypy
      - name: Build and inspect distributions
        run: |
          python -m build --no-isolation
          python -m twine check --strict dist/*
          python tools/verify_package.py dist
      - name: Upload verified distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish verified distributions
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/applied-ai-rig
    permissions:
      id-token: write
    steps:
      - name: Download verified distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish distributions with Trusted Publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
