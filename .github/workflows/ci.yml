name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.13"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install development dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Compile sources
        run: python -m compileall -q init.py applied_ai_rig tests tools

  quality:
    name: Lint and type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"
      - name: Install tools
        run: python -m pip install -e ".[dev]"
      - name: Ruff
        run: ruff check init.py applied_ai_rig tests tools
      - name: Mypy
        run: mypy

  package:
    name: Package smoke / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"
      - name: Install pinned build tools
        run: python -m pip install -r requirements/release.txt
      - name: Build the source and wheel distributions
        run: python -m build --no-isolation
      - name: Inspect and smoke-test the installed wheel
        run: python tools/verify_package.py dist
      - name: Generate a fixture for the composite action
        run: python init.py "${{ runner.temp }}/action-fixture" --modules none --non-interactive
      - name: Test the local composite action
        uses: ./
        with:
          target: ${{ runner.temp }}/action-fixture
      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: applied-ai-rig-distributions-${{ matrix.os }}
          path: dist/
          if-no-files-found: error
          retention-days: 7
