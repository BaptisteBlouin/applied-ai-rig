name: Applied AI Rig structural check
description: Validate an installed Applied AI Rig manifest, files, links, register headers, and placeholders
author: Baptiste Blouin

inputs:
  target:
    description: Project directory containing the installed Applied AI Rig
    required: false
    default: .

runs:
  using: composite
  steps:
    - name: Check Applied AI Rig records
      shell: bash
      run: python "$GITHUB_ACTION_PATH/init.py" --check "${{ inputs.target }}"

branding:
  icon: check-circle
  color: blue
